<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giving Hope in DuBois</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#2b5cff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:16px;
}

.card{
background:white;
border-radius:10px;
padding:16px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.types{
color:#666;
font-size:14px;
margin-bottom:8px;
}

.notes{
margin-bottom:10px;
font-size:14px;
}

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

.call{
background:#28a745;
color:white;
}

.directions{
background:#444;
color:white;
}

.status{
text-align:center;
margin:20px;
color:#777;
}

</style>
</head>

<body>

<header>
Giving Hope in DuBois
</header>

<div class="container">

<div id="status" class="status">
Loading listings...
</div>

<div id="listings"></div>

</div>

<script>

const supabaseUrl = "https://jvnmqvdgnywtgjcyagiu.supabase.co"
const supabaseKey = "sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

async function loadListings(){

const { data, error } = await supabase
.from("listings_core")
.select("*")

const status = document.getElementById("status")

if(error){
status.innerText = "Error loading listings"
console.error(error)
return
}

if(!data || data.length === 0){
status.innerText = "No listings yet"
return
}

status.style.display = "none"

const container = document.getElementById("listings")

data.forEach(l => {

const card = document.createElement("div")
card.className = "card"

card.innerHTML = `
<div class="name">${l.name || ""}</div>
<div class="types">${(l.types || []).join(", ")}</div>
<div class="notes">${l.notes || ""}</div>

<div class="buttons">
<button class="call" onclick="window.location.href='tel:${l.contact}'">Call</button>
<button class="directions" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(l.location)}')">Directions</button>
</div>
`

container.appendChild(card)

})

}

loadListings()

</script>

</body>
</html>
