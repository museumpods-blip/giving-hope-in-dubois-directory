<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustOffI80 – DuBois Exit Guide</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4;}
header{background:#2b5cff;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
.container{max-width:900px;margin:auto;padding:16px;}

.qr-section{
background:white;
padding:24px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
text-align:center;
}

.qr-section h2{
margin-top:0;
color:#2b5cff;
}

.qr-section p{
color:#555;
line-height:1.6;
}

.qr-section img{
max-width:260px;
margin:20px 0;
}

.download-btn{
display:inline-block;
background:#2b5cff;
color:white;
padding:12px 18px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.search input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:12px;
}

.locate-btn,.submit-btn{
background:#2b5cff;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
margin-bottom:10px;
margin-right:6px;
}

#map{height:320px;border-radius:10px;margin-bottom:20px;}

.card{
background:white;
border-radius:10px;
padding:16px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.name{font-size:18px;font-weight:bold;}
.address{color:#555;margin-bottom:8px;}
</style>
</head>

<body>

<header>Just Off i80 – A DuBois, PA Resource Guide</header>

<div class="container">

<!-- QR SECTION -->
<div class="qr-section">
<h2>Share the Guide</h2>

<p>
Download and share the official QR code.
Display it in your business, organization, or event space to help others discover DuBois.
</p>

<img src="qr-code.png" alt="JustOffI80 QR Code">

<br>

<a href="qr-code.png" download="JustOffI80-QR.png" class="download-btn">
Download QR Code (PNG)
</a>

</div>

<button class="submit-btn">+ Submit Listing</button>
<button id="locateBtn" class="locate-btn">📍 Locate Me</button>

<div class="search">
<input type="text" placeholder="Search...">
</div>

<div id="map"></div>
<div id="listings"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://jvnmqvdgnywtgjcyagiu.supabase.co"
const supabaseKey="sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm"
const supabase=createClient(supabaseUrl,supabaseKey)

let listings=[]

const map=L.map('map').setView([41.12,-78.76],12)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map)

async function loadListings(){
const {data}=await supabase.from("listings_core").select("*").eq("approved",true)
listings=data||[]
renderListings()
}

function renderListings(){
const container=document.getElementById("listings")
container.innerHTML=""
listings.forEach(l=>{
const card=document.createElement("div")
card.className="card"
card.innerHTML=`
<div class="name">${l.name||""}</div>
<div class="address">${l.location||""}</div>
<div>${l.notes||""}</div>
`
container.appendChild(card)
})
}

loadListings()

</script>
</body>
</html>
