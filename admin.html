<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustOffI80 Admin</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#f4f4f4;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --blue:#2563eb;
      --green:#16a34a;
      --red:#dc2626;
      --gray:#444;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}
    header{background:#222;color:#fff;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
    .container{max-width:1100px;margin:auto;padding:16px;}
    .topbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .count{font-weight:bold;color:#333;}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .link-btn,.refresh-btn,.btn{
      border:none;padding:10px 14px;border-radius:6px;cursor:pointer;color:#fff;font-size:14px;text-decoration:none;
      display:inline-flex;align-items:center;justify-content:center;
    }
    .link-btn{background:var(--gray)}
    .refresh-btn{background:var(--blue)}
    .save{background:var(--blue)}
    .approve{background:var(--green)}
    .delete{background:var(--red)}
    .notice{margin:12px 0;padding:12px 14px;border-radius:8px;display:none;border:1px solid transparent;white-space:pre-wrap;}
    .notice.show{display:block}
    .notice.success{background:#e9f9ee;color:#166534;border-color:#86efac;}
    .notice.error{background:#fef2f2;color:#991b1b;border-color:#fca5a5;}
    .card{background:var(--card);border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
    .card h3{margin:0 0 12px 0;font-size:20px;}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field.full{grid-column:1 / -1;}
    label{font-size:13px;color:#555;font-weight:bold;}
    input,textarea{width:100%;padding:10px;border-radius:6px;border:1px solid #ccc;font:inherit;}
    textarea{min-height:100px;resize:vertical;}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
    .meta{font-size:12px;color:var(--muted);margin-top:10px;word-break:break-all;line-height:1.5;}
    .empty{background:#fff;border-radius:10px;padding:24px;text-align:center;color:#666;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
    .btn:disabled,.refresh-btn:disabled{opacity:.65;cursor:not-allowed;}
    .category-box{
      border:1px solid #ccc;
      border-radius:6px;
      padding:10px;
      background:#fff;
    }
    .category-grid{
      display:flex;
      flex-wrap:wrap;
      gap:8px 12px;
    }
    .category-grid label{
      display:flex;
      align-items:center;
      gap:6px;
      font-size:14px;
      cursor:pointer;
    }
    .preview-image{
      width:100%;
      max-height:280px;
      object-fit:cover;
      border:1px solid #ddd;
      border-radius:10px;
      background:#fafafa;
    }
    .image-link{
      font-size:12px;
      color:#2563eb;
      word-break:break-all;
      text-decoration:none;
    }
    .image-link:hover{text-decoration:underline;}
    @media (max-width:700px){.grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <header>JustOffI80 Admin – Pending Submissions</header>

  <div class="container">
    <div class="topbar">
      <div class="count">Pending submissions: <span id="pendingCount">0</span></div>
      <div class="top-actions">
        <a class="link-btn" href="./index.html">Public Site</a>
        <button id="refreshBtn" class="refresh-btn" type="button">Refresh</button>
      </div>
    </div>

    <div id="notice" class="notice"></div>
    <div id="rows"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://jvnmqvdgnywtgjcyagiu.supabase.co";
    const supabaseKey = "sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm";
    const supabase = createClient(supabaseUrl, supabaseKey);

    const CATEGORY_OPTIONS = [
      "food",
      "shelter",
      "clothing",
      "health",
      "recovery",
      "transportation",
      "church",
      "employment",
      "family",
      "legal",
      "veterans",
      "yard sale",
      "business",
      "auto",
      "lodging",
      "gas",
      "community",
      "emergency"
    ];

    const rowsEl = document.getElementById("rows");
    const pendingCountEl = document.getElementById("pendingCount");
    const noticeEl = document.getElementById("notice");
    const refreshBtn = document.getElementById("refreshBtn");

    function showNotice(message, type = "success") {
      noticeEl.textContent = message;
      noticeEl.className = `notice show ${type}`;
    }

    function clearNotice() {
      noticeEl.textContent = "";
      noticeEl.className = "notice";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalize(value) {
      return String(value ?? "").trim();
    }

    function normalizeCategory(value) {
      return normalize(value).toLowerCase();
    }

    function parseTypes(value) {
      if (Array.isArray(value)) {
        return value.map(v => normalizeCategory(v)).filter(Boolean);
      }

      const raw = normalize(value);
      if (!raw) return [];

      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          return parsed.map(v => normalizeCategory(v)).filter(Boolean);
        }
      } catch (error) {}

      return raw.split(",").map(v => normalizeCategory(v)).filter(Boolean);
    }

    function buildCategoryCheckboxes(rowId, selectedTypes) {
      const selectedSet = new Set(selectedTypes);
      return CATEGORY_OPTIONS.map(category => `
        <label>
          <input
            type="checkbox"
            data-row-id="${escapeHtml(rowId)}"
            name="admin_types_${escapeHtml(rowId)}"
            value="${escapeHtml(category)}"
            ${selectedSet.has(category) ? "checked" : ""}
          >
          <span>${escapeHtml(category)}</span>
        </label>
      `).join("");
    }

    function getAdminTypes(card) {
      const checked = [...card.querySelectorAll('input[type="checkbox"][data-row-id]:checked')]
        .map(input => normalizeCategory(input.value))
        .filter(Boolean);

      const extra = normalize(card.querySelector('[data-field="types_extra"]').value);
      const extraTypes = extra
        ? extra.split(",").map(v => normalizeCategory(v)).filter(Boolean)
        : [];

      return [...new Set([...checked, ...extraTypes])];
    }

    function getSubmissionPayload(card) {
      return {
        name: normalize(card.querySelector('[data-field="name"]').value),
        types: getAdminTypes(card),
        location: normalize(card.querySelector('[data-field="location"]').value),
        contact: normalize(card.querySelector('[data-field="contact"]').value),
        notes: normalize(card.querySelector('[data-field="notes"]').value),
        map_link: normalize(card.querySelector('[data-field="map_link"]').value),
        image_path: normalize(card.querySelector('[data-field="image_path"]').value)
      };
    }

    function getApprovalPayload(card) {
      const base = getSubmissionPayload(card);
      const town = normalize(card.querySelector('[data-field="town"]').value);

      return {
        name: base.name,
        types: base.types,
        town,
        location: base.location,
        contact: base.contact,
        notes: base.notes,
        map_link: base.map_link,
        image_path: base.image_path,
        approved: true
      };
    }

    function setBusy(card, busy) {
      card.querySelectorAll("button").forEach(btn => btn.disabled = busy);
      card.style.opacity = busy ? "0.7" : "1";
    }

    function splitKnownAndExtraTypes(types) {
      const known = [];
      const extra = [];

      types.forEach(type => {
        if (CATEGORY_OPTIONS.includes(type)) {
          known.push(type);
        } else {
          extra.push(type);
        }
      });

      return { known, extra };
    }

    function renderCard(row) {
      const parsedTypes = parseTypes(row.types);
      const { known, extra } = splitKnownAndExtraTypes(parsedTypes);

      return `
        <div class="card" data-id="${escapeHtml(row.id)}">
          <h3>${escapeHtml(row.name || "(Untitled)")}</h3>

          <div class="grid">
            <div class="field">
              <label>Name</label>
              <input data-field="name" value="${escapeHtml(row.name || "")}">
            </div>

            <div class="field">
              <label>Town (for approved listing)</label>
              <input data-field="town" value="" placeholder="Optional, example: DuBois">
            </div>

            <div class="field full">
              <label>Categories</label>
              <div class="category-box">
                <div class="category-grid">
                  ${buildCategoryCheckboxes(row.id, known)}
                </div>
              </div>
            </div>

            <div class="field full">
              <label>Other Categories (comma separated)</label>
              <input
                data-field="types_extra"
                value="${escapeHtml(extra.join(", "))}"
                placeholder="add only if truly needed"
              >
            </div>

            <div class="field">
              <label>Location</label>
              <input data-field="location" value="${escapeHtml(row.location || "")}">
            </div>

            <div class="field">
              <label>Contact</label>
              <input data-field="contact" value="${escapeHtml(row.contact || "")}">
            </div>

            <div class="field full">
              <label>Map Link</label>
              <input data-field="map_link" value="${escapeHtml(row.map_link || "")}">
            </div>

            <div class="field full">
              <label>Notes</label>
              <textarea data-field="notes">${escapeHtml(row.notes || "")}</textarea>
            </div>

            <div class="field full">
              <label>Image URL</label>
              <input data-field="image_path" value="${escapeHtml(row.image_path || "")}">
            </div>

            ${
              row.image_path
                ? `
                  <div class="field full">
                    <label>Image Preview</label>
                    <img class="preview-image" src="${escapeHtml(row.image_path)}" alt="${escapeHtml(row.name || "Submission image")}">
                    <a class="image-link" href="${escapeHtml(row.image_path)}" target="_blank" rel="noopener noreferrer">${escapeHtml(row.image_path)}</a>
                  </div>
                `
                : ""
            }
          </div>

          <div class="actions">
            <button class="btn save" data-action="save" type="button">Save</button>
            <button class="btn approve" data-action="approve" type="button">Approve</button>
            <button class="btn delete" data-action="delete" type="button">Delete</button>
          </div>

          <div class="meta">
            <div><strong>Submission ID:</strong> ${escapeHtml(row.id)}</div>
            <div><strong>Created:</strong> ${escapeHtml(row.created_at || "")}</div>
          </div>
        </div>
      `;
    }

    async function loadPending() {
      clearNotice();
      refreshBtn.disabled = true;
      rowsEl.innerHTML = `<div class="empty">Loading pending submissions...</div>`;

      const { data, error } = await supabase
        .from("listing_submissions")
        .select("id, name, types, location, contact, notes, map_link, created_at, image_path")
        .order("created_at", { ascending: false });

      refreshBtn.disabled = false;

      if (error) {
        pendingCountEl.textContent = "0";
        rowsEl.innerHTML = `<div class="empty">Failed to load pending submissions.</div>`;
        showNotice(`Load failed: ${error.message}`, "error");
        return;
      }

      const rows = data || [];
      pendingCountEl.textContent = String(rows.length);

      if (rows.length === 0) {
        rowsEl.innerHTML = `<div class="empty">No pending submissions.</div>`;
        return;
      }

      rowsEl.innerHTML = rows.map(renderCard).join("");
      bindActions();
    }

    async function insertApprovedListing(payload) {
      const { error } = await supabase
        .from("listings_core")
        .insert([payload]);

      if (!error) return { error: null };

      if (String(error.message || "").toLowerCase().includes("image_path")) {
        const retryPayload = { ...payload };
        delete retryPayload.image_path;

        const retry = await supabase
          .from("listings_core")
          .insert([retryPayload]);

        return retry;
      }

      return { error };
    }

    function bindActions() {
      const cards = rowsEl.querySelectorAll(".card");

      cards.forEach(card => {
        card.querySelector('[data-action="save"]').addEventListener("click", async () => {
          clearNotice();
          const id = card.dataset.id;
          const payload = getSubmissionPayload(card);

          if (!payload.name || !payload.location) {
            showNotice("Name and Location are required.", "error");
            return;
          }

          if (payload.types.length === 0) {
            showNotice("Please select at least one category.", "error");
            return;
          }

          setBusy(card, true);

          const { error } = await supabase
            .from("listing_submissions")
            .update(payload)
            .eq("id", id);

          setBusy(card, false);

          if (error) {
            showNotice(`Save failed: ${error.message}`, "error");
            return;
          }

          showNotice(`Saved "${payload.name}"`, "success");
          await loadPending();
        });

        card.querySelector('[data-action="approve"]').addEventListener("click", async () => {
          clearNotice();
          const id = card.dataset.id;
          const submissionPayload = getSubmissionPayload(card);
          const approvalPayload = getApprovalPayload(card);

          if (!approvalPayload.name || !approvalPayload.location) {
            showNotice("Name and Location are required before approval.", "error");
            return;
          }

          if (approvalPayload.types.length === 0) {
            showNotice("Please select at least one category before approval.", "error");
            return;
          }

          setBusy(card, true);

          const insertResult = await insertApprovedListing(approvalPayload);

          if (insertResult.error) {
            setBusy(card, false);
            showNotice(`Approve failed: ${insertResult.error.message}`, "error");
            return;
          }

          const deleteResult = await supabase
            .from("listing_submissions")
            .delete()
            .eq("id", id);

          setBusy(card, false);

          if (deleteResult.error) {
            showNotice(
              `Approved "${submissionPayload.name}", but failed to remove pending row: ${deleteResult.error.message}`,
              "error"
            );
            await loadPending();
            return;
          }

          showNotice(`Approved "${submissionPayload.name}"`, "success");
          await loadPending();
        });

        card.querySelector('[data-action="delete"]').addEventListener("click", async () => {
          clearNotice();
          const id = card.dataset.id;
          const name = normalize(card.querySelector('[data-field="name"]').value) || id;

          if (!window.confirm(`Delete "${name}" permanently from pending submissions?`)) return;

          setBusy(card, true);

          const { error } = await supabase
            .from("listing_submissions")
            .delete()
            .eq("id", id);

          setBusy(card, false);

          if (error) {
            showNotice(`Delete failed: ${error.message}`, "error");
            return;
          }

          showNotice(`Deleted "${name}"`, "success");
          await loadPending();
        });
      });
    }

    refreshBtn.addEventListener("click", loadPending);
    loadPending();
  </script>
</body>
</html>
