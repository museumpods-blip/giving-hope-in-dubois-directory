<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JustOffI80 – DuBois Exit Guide</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4;}
    header{background:#2b5cff;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
    .container{max-width:900px;margin:auto;padding:16px;}
    .search input{width:100%;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ccc;margin-bottom:12px;}
    .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
    .filter{background:white;border:1px solid #ddd;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:14px;text-transform:capitalize;}
    .filter.active{background:#2b5cff;color:white;}
    .locate-btn,.submit-btn{
      background:#2b5cff;color:white;border:none;padding:10px 14px;
      border-radius:6px;cursor:pointer;margin-bottom:10px;margin-right:6px;
    }
    #map{height:320px;border-radius:10px;margin-bottom:20px;}
    .card{
      background:white;border-radius:10px;padding:16px;margin-bottom:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
      cursor:pointer;transition:0.2s;
    }
    .card:hover{box-shadow:0 4px 10px rgba(0,0,0,0.15);}
    .card.highlight{
      border:2px solid #2b5cff;
      box-shadow:0 6px 16px rgba(0,0,0,0.2);
    }
    .name{font-size:18px;font-weight:bold;}
    .address{color:#555;margin-bottom:8px;}
    .address a{color:#2b5cff;text-decoration:none;}
    .address a:hover{text-decoration:underline;}
    .buttons{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
    .btn{flex:1;padding:10px;border-radius:6px;text-align:center;text-decoration:none;color:white;font-size:14px;}
    .call{background:#28a745;}
    .directions{background:#444;}
    .remove{background:#c82333;}
    .form-box{
      background:white;padding:16px;border-radius:10px;margin-bottom:20px;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);display:none;
    }
    .form-box input,.form-box textarea{
      width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc;
    }
    .success{color:green;font-weight:bold;margin-top:10px;}
    .error{color:#b91c1c;font-weight:bold;margin-top:10px;white-space:pre-wrap;}
  </style>
</head>
<body>
  <header>Just Off i80 – A DuBois, PA Resource Guide</header>

  <div style="text-align:center;padding:18px 20px;background:#ffffff;box-shadow:0 2px 6px rgba(0,0,0,0.06);">
    <div style="font-size:16px;font-style:italic;color:#444;margin-bottom:10px;">
      No One Forgotten. No One Alone.
    </div>
    <div style="font-size:15px;color:#555;line-height:1.6;max-width:700px;margin:0 auto;">
      This curated platform connects residents and visitors to trusted local businesses, services, and community resources.
      Organizations serving the DuBois area may submit a listing for review and listing.
    </div>
  </div>

  <div class="container">
    <button class="submit-btn" onclick="toggleForm()">+ Submit Listing</button>
    <button id="locateBtn" class="locate-btn">📍 Locate Me</button>

    <div id="submissionForm" class="form-box">
      <h3>Submit a Listing</h3>
      <input id="s_name" placeholder="Organization Name" required />
      <input id="s_types" placeholder="Categories (comma separated)" required />
      <input id="s_location" placeholder="Full Address (required)" required />
      <input id="s_contact" placeholder="Phone" />
      <input id="s_map_link" placeholder="Google Maps share link (optional, only needed for pin placement if no lat/lng)" />
      <textarea id="s_notes" placeholder="Description"></textarea>
      <button id="submitBtn" class="submit-btn" onclick="submitListing()">Submit</button>
      <div id="formSuccess" class="success"></div>
      <div id="formError" class="error"></div>
    </div>

    <div class="search">
      <input id="searchBox" type="text" placeholder="Search..." />
    </div>

    <div id="filters" class="filters"></div>
    <div id="map"></div>
    <div id="listings"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://jvnmqvdgnywtgjcyagiu.supabase.co";
    const supabaseKey = "sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm";
    const supabase = createClient(supabaseUrl, supabaseKey);

    let listings = [];
    let markersById = {};
    let cardsById = {};
    let activeFilter = null;
    let searchTerm = "";
    let userMarker = null;

    const map = L.map("map").setView([41.12, -78.76], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(map);
    const markerGroup = L.featureGroup().addTo(map);

    const redIcon = new L.Icon({
      iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png",
      shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    function normalize(value) {
      return String(value ?? "").trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseTypes(value) {
      if (Array.isArray(value)) {
        return value.map(v => normalize(v).toLowerCase()).filter(Boolean);
      }

      const raw = normalize(value);
      if (!raw) return [];

      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          return parsed.map(v => normalize(v).toLowerCase()).filter(Boolean);
        }
      } catch (error) {}

      return raw.split(",").map(v => v.trim().toLowerCase()).filter(Boolean);
    }

    function makeGoogleMapsSearchUrl(address) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address || "")}`;
    }

    function makeGoogleMapsDirectionsUrl(address) {
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address || "")}`;
    }

    function extractCoords(link, lat, lng) {
      if (typeof lat === "number" && typeof lng === "number") {
        return { lat, lng };
      }

      if (!link) return null;

      let match = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (match) {
        return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
      }

      match = link.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (match) {
        return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
      }

      return null;
    }

    function cleanPhone(phone) {
      return (phone || "").replace(/[^0-9]/g, "");
    }

    function showFormMessage(successText = "", errorText = "") {
      const successEl = document.getElementById("formSuccess");
      const errorEl = document.getElementById("formError");
      successEl.innerText = successText;
      errorEl.innerText = errorText;
    }

    window.toggleForm = function () {
      const form = document.getElementById("submissionForm");
      form.style.display = form.style.display === "none" ? "block" : "none";
    };

    window.submitListing = async function () {
      const submitBtn = document.getElementById("submitBtn");

      const name = normalize(document.getElementById("s_name").value);
      const types = parseTypes(document.getElementById("s_types").value);
      const location = normalize(document.getElementById("s_location").value);
      const contact = normalize(document.getElementById("s_contact").value);
      const map_link = normalize(document.getElementById("s_map_link").value);
      const notes = normalize(document.getElementById("s_notes").value);

      showFormMessage();

      if (!name || !location) {
        showFormMessage("", "Name and Address are required.");
        return;
      }

      const payload = {
        name,
        types,
        location,
        contact,
        notes,
        map_link,
        approved: false
      };

      submitBtn.disabled = true;
      submitBtn.innerText = "Submitting...";

      const { error } = await supabase
        .from("listings_core")
        .insert([payload]);

      submitBtn.disabled = false;
      submitBtn.innerText = "Submit";

      if (error) {
        showFormMessage("", `Submission failed: ${error.message}`);
        return;
      }

      showFormMessage("Submitted for approval.", "");

      document.getElementById("s_name").value = "";
      document.getElementById("s_types").value = "";
      document.getElementById("s_location").value = "";
      document.getElementById("s_contact").value = "";
      document.getElementById("s_map_link").value = "";
      document.getElementById("s_notes").value = "";
    };

    async function loadListings() {
      const { data, error } = await supabase
        .from("listings_core")
        .select("id, name, types, location, contact, notes, lat, lng, map_link, approved")
        .eq("approved", true)
        .order("name", { ascending: true });

      if (error) {
        document.getElementById("listings").innerHTML = `<div class="card">Failed to load listings: ${escapeHtml(error.message)}</div>`;
        return;
      }

      listings = (data || []).map(row => ({
        ...row,
        types: parseTypes(row.types)
      }));

      renderFilters();
      renderListings();
    }

    function renderFilters() {
      const filterBox = document.getElementById("filters");
      filterBox.innerHTML = "";

      const allTypes = new Set();
      listings.forEach(l => {
        if (Array.isArray(l.types)) {
          l.types.forEach(t => allTypes.add(String(t).toLowerCase()));
        }
      });

      const allButton = document.createElement("div");
      allButton.className = "filter active";
      allButton.innerText = "All";
      allButton.onclick = () => {
        activeFilter = null;
        renderListings();
        updateActive(allButton);
      };
      filterBox.appendChild(allButton);

      [...allTypes].sort().forEach(type => {
        const btn = document.createElement("div");
        btn.className = "filter";
        btn.innerText = type;
        btn.onclick = () => {
          activeFilter = type;
          renderListings();
          updateActive(btn);
        };
        filterBox.appendChild(btn);
      });
    }

    function updateActive(btn) {
      document.querySelectorAll(".filter").forEach(f => f.classList.remove("active"));
      btn.classList.add("active");
    }

    function highlightCard(id) {
      const card = cardsById[id];
      if (!card) return;
      card.classList.add("highlight");
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      setTimeout(() => card.classList.remove("highlight"), 2000);
    }

    function renderListings() {
      const container = document.getElementById("listings");
      container.innerHTML = "";
      markerGroup.clearLayers();
      markersById = {};
      cardsById = {};

      let filtered = listings;

      if (activeFilter) {
        filtered = filtered.filter(l => Array.isArray(l.types) && l.types.includes(activeFilter));
      }

      if (searchTerm) {
        filtered = filtered.filter(l => {
          const text = `${l.name || ""} ${l.location || ""} ${l.notes || ""}`.toLowerCase();
          return text.includes(searchTerm.toLowerCase());
        });
      }

      filtered.forEach(l => {
        const coords = extractCoords(l.map_link, l.lat, l.lng);

        if (coords) {
          const phoneClean = cleanPhone(l.contact);
          const popupContent = `
            <b>${escapeHtml(l.name || "")}</b><br>
            <a target="_blank" href="${makeGoogleMapsSearchUrl(l.location || "")}">${escapeHtml(l.location || "")}</a><br><br>
            <a href="tel:${phoneClean}">Call</a> |
            <a target="_blank" href="${makeGoogleMapsDirectionsUrl(l.location || "")}">Directions</a>
          `;

          const marker = L.marker([coords.lat, coords.lng])
            .addTo(markerGroup)
            .bindPopup(popupContent);

          marker.on("click", () => highlightCard(l.id));
          markersById[l.id] = marker;
        }

        const phoneClean = cleanPhone(l.contact);
        const subject = encodeURIComponent("Removal Request – " + (l.name || ""));
        const mapsSearchUrl = makeGoogleMapsSearchUrl(l.location || "");
        const directionsUrl = makeGoogleMapsDirectionsUrl(l.location || "");

        const card = document.createElement("div");
        card.className = "card";

        card.addEventListener("click", (event) => {
          if (event.target.closest("a")) return;

          const marker = markersById[l.id];
          if (marker) {
            map.setView(marker.getLatLng(), 16, { animate: true });
            marker.openPopup();
          } else if (l.location) {
            window.open(mapsSearchUrl, "_blank", "noopener");
          }
        });

        card.innerHTML = `
          <div class="name">${escapeHtml(l.name || "")}</div>
          <div class="address">
            <a href="${mapsSearchUrl}" target="_blank" rel="noopener noreferrer">
              ${escapeHtml(l.location || "")}
            </a>
          </div>
          <div>${escapeHtml(l.notes || "")}</div>
          <div>Phone: ${escapeHtml(l.contact || "")}</div>
          <div class="buttons">
            <a class="btn call" href="tel:${phoneClean}">Call</a>
            <a class="btn directions" target="_blank" rel="noopener noreferrer" href="${directionsUrl}">Directions</a>
            <a class="btn remove" href="mailto:i80app@gmail.com?subject=${subject}">Request Removal</a>
          </div>
        `;

        container.appendChild(card);
        cardsById[l.id] = card;
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div class="card">No listings found.</div>`;
      }
    }

    document.getElementById("searchBox").addEventListener("input", e => {
      searchTerm = e.target.value;
      renderListings();
    });

    document.getElementById("locateBtn").addEventListener("click", () => {
      if (!navigator.geolocation) return;

      navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        map.setView([lat, lng], 14);

        if (userMarker) map.removeLayer(userMarker);

        userMarker = L.marker([lat, lng], { icon: redIcon })
          .addTo(map)
          .bindPopup("<b>You Are Here</b>")
          .openPopup();
      });
    });

    loadListings();
  </script>
</body>
</html>
