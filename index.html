<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meet Scout – JustOffI80</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #2b5cff;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 16px;
}

.search input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 14px;
}

#map {
  height: 320px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.address {
  color: #555;
  margin-bottom: 8px;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.btn {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  text-align: center;
  text-decoration: none;
  color: white;
}

.call { background: #28a745; }
.directions { background: #444; }

.locate-btn {
  background: #2b5cff;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 14px;
}
</style>

</head>
<body>

<header>
Meet Scout – JustOffI80
</header>

<div class="container">

<div class="search">
<input id="searchBox" type="text" placeholder="Search places...">
</div>

<button id="locateBtn" class="locate-btn">📍 Locate Me</button>

<div id="map"></div>
<div id="listings"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl = "https://jvnmqvdgnywtgjcyagiu.supabase.co"
const supabaseKey = "SUPABASE_KEY_HERE"

const supabase = createClient(supabaseUrl, supabaseKey)

let listings = []
let searchTerm = ""

const map = L.map('map').setView([41.12, -78.76], 12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map)

let markerGroup = L.featureGroup().addTo(map)
let userMarker = null

function extractCoords(link) {
  if (!link) return null
  const match = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/)
  if (match) {
    return {
      lat: parseFloat(match[1]),
      lng: parseFloat(match[2])
    }
  }
  return null
}

function cleanPhone(phone) {
  return (phone || "").replace(/[^0-9]/g, '')
}

async function loadListings() {

  const { data, error } = await supabase
    .from("listings_core")
    .select("*")
    .eq("approved", true)

  if (error) {
    console.error(error)
    return
  }

  listings = data
  renderListings()
}

function renderListings() {

  const container = document.getElementById("listings")
  container.innerHTML = ""
  markerGroup.clearLayers()

  let filtered = listings

  if (searchTerm) {
    filtered = filtered.filter(l => {
      const text = (l.name || "") + (l.location || "") + (l.notes || "")
      return text.toLowerCase().includes(searchTerm.toLowerCase())
    })
  }

  filtered.forEach(l => {

    const coords = extractCoords(l.map_link)

    if (coords) {

      const phoneClean = cleanPhone(l.contact)

      const popupContent = `
        <div style="font-size:14px; max-width:220px;">
          <div style="font-weight:bold; margin-bottom:4px;">
            ${l.name || ""}
          </div>

          <div style="margin-bottom:6px;">
            ${l.location || ""}
          </div>

          <div style="margin-bottom:6px; color:#555;">
            ${l.notes || ""}
          </div>

          <div style="display:flex; gap:6px; margin-top:8px;">
            <a href="tel:${phoneClean}" 
               style="flex:1; background:#28a745; color:white; text-align:center; padding:6px; border-radius:4px; text-decoration:none;">
               Call
            </a>

            <a target="_blank"
               href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(l.location)}"
               style="flex:1; background:#444; color:white; text-align:center; padding:6px; border-radius:4px; text-decoration:none;">
               Directions
            </a>
          </div>
        </div>
      `

      L.marker([coords.lat, coords.lng])
        .addTo(markerGroup)
        .bindPopup(popupContent)
    }

    const phoneClean = cleanPhone(l.contact)

    const card = document.createElement("div")
    card.className = "card"

    card.innerHTML = `
      <div class="name">${l.name || ""}</div>
      <div class="address">${l.location || ""}</div>
      <div>${l.notes || ""}</div>

      <div class="buttons">
        <a class="btn call" href="tel:${phoneClean}">Call</a>
        <a class="btn directions" target="_blank"
          href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(l.location)}">
          Directions
        </a>
      </div>
    `

    container.appendChild(card)
  })

  if (markerGroup.getLayers().length > 0) {
    map.fitBounds(markerGroup.getBounds(), { padding: [40, 40] })
  }
}

document.getElementById("searchBox").addEventListener("input", e => {
  searchTerm = e.target.value
  renderListings()
})

document.getElementById("locateBtn").addEventListener("click", () => {

  if (!navigator.geolocation) {
    alert("Geolocation not supported.")
    return
  }

  navigator.geolocation.getCurrentPosition(position => {

    const lat = position.coords.latitude
    const lng = position.coords.longitude

    if (userMarker) {
      map.removeLayer(userMarker)
    }

    userMarker = L.marker([lat, lng])
      .addTo(map)
      .bindPopup("<b>You are here</b>")
      .openPopup()

    map.setView([lat, lng], 14)

  }, () => {
    alert("Location access denied or unavailable.")
  })
})

loadListings()

</script>

</body>
</html>
