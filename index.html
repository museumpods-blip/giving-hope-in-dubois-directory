<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giving Hope in DuBois</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#2b5cff;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:16px;
}

.search{
margin-bottom:16px;
}

.search input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:16px;
}

.filter{
background:white;
border:1px solid #ddd;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.filter.active{
background:#2b5cff;
color:white;
}

.map-tools{
margin-bottom:10px;
}

.locate-btn{
background:#2b5cff;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

#map{
height:320px;
border-radius:10px;
margin-bottom:20px;
}

.card{
background:white;
border-radius:10px;
padding:16px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:4px;
}

.address{
font-size:14px;
color:#555;
margin-bottom:8px;
}

.phone{
margin-bottom:10px;
}

.buttons{
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:10px;
border-radius:6px;
text-align:center;
text-decoration:none;
color:white;
}

.call{background:#28a745;}
.directions{background:#444;}

</style>

</head>

<body>

<header>
Giving Hope in DuBois
</header>

<div class="container">

<div class="search">
<input id="searchBox" type="text" placeholder="Search services...">
</div>

<div id="filters" class="filters"></div>

<div class="map-tools">
<button class="locate-btn" id="locateBtn">📍 Locate Me</button>
</div>

<div id="map"></div>

<div id="listings"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://jvnmqvdgnywtgjcyagiu.supabase.co"
const supabaseKey="sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm"

const supabase=createClient(supabaseUrl,supabaseKey)

let listings=[]

const map=L.map('map').setView([41.12,-78.76],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map)

let markerGroup=L.featureGroup().addTo(map)

function extractCoords(link){

if(!link) return null

const match=link.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/)

if(match){
return{
lat:parseFloat(match[1]),
lng:parseFloat(match[2])
}
}

return null
}

function cleanPhone(phone){
return (phone||"").replace(/[^0-9]/g,'')
}

function getMarkerColor(types){

if(!types) return "blue"

if(types.includes("food")) return "green"
if(types.includes("housing")) return "blue"
if(types.includes("warming")) return "orange"
if(types.includes("church")) return "purple"
if(types.includes("medical")) return "red"

return "blue"

}

function createMarker(lat,lng,color){

return L.circleMarker([lat,lng],{
radius:8,
fillColor:color,
color:"#000",
weight:1,
opacity:1,
fillOpacity:0.8
})

}

async function loadListings(){

const {data,error}=await supabase
.from("listings_core")
.select("*")

if(error){
console.error(error)
return
}

listings=data

renderListings()

}

function renderListings(){

const container=document.getElementById("listings")

container.innerHTML=""

markerGroup.clearLayers()

listings.forEach(l=>{

const coords=extractCoords(l.map_link)

if(coords){

const color=getMarkerColor(l.types)

const marker=createMarker(coords.lat,coords.lng,color)

marker.bindPopup(`<b>${l.name}</b>`)

markerGroup.addLayer(marker)

}

const phoneClean=cleanPhone(l.contact)

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="name">${l.name||""}</div>
<div class="address">${l.location||""}</div>
<div>${l.notes||""}</div>
<div class="phone">Phone: ${l.contact||""}</div>

<div class="buttons">
<a class="btn call" href="tel:${phoneClean}">Call</a>
<a class="btn directions" target="_blank"
href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(l.location)}">
Directions
</a>
</div>
`

container.appendChild(card)

})

if(markerGroup.getLayers().length>0){
map.fitBounds(markerGroup.getBounds(),{padding:[40,40]})
}

}

document.getElementById("locateBtn").addEventListener("click",()=>{

if(!navigator.geolocation){
alert("Geolocation not supported")
return
}

navigator.geolocation.getCurrentPosition(position=>{

const lat=position.coords.latitude
const lng=position.coords.longitude

map.setView([lat,lng],14)

L.marker([lat,lng])
.addTo(map)
.bindPopup("You are here")
.openPopup()

})

})

loadListings()

</script>

</body>
</html>
