<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giving Hope in DuBois Directory</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#2b5cff;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:16px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:16px;
}

.filter{
background:white;
border:1px solid #ddd;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.filter.active{
background:#2b5cff;
color:white;
}

.card{
background:white;
border-radius:10px;
padding:16px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.name{
font-size:18px;
font-weight:bold;
margin-bottom:6px;
}

.types{
color:#666;
font-size:14px;
margin-bottom:8px;
}

.notes{
margin-bottom:10px;
font-size:14px;
}

.buttons{
display:flex;
gap:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

.call{
background:#28a745;
color:white;
}

.directions{
background:#444;
color:white;
}

</style>
</head>

<body>

<header>
Giving Hope in DuBois
</header>

<div class="container">

<div class="filters" id="filters"></div>

<div id="listings"></div>

</div>

<script>

const supabaseUrl = "https://jvnmqvdgnywtgjcyagiu.supabase.co"
const supabaseKey = "sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

let listings = []
let activeFilter = null

async function loadListings(){

const { data, error } = await supabase
.from("listings_core")
.select("*")

if(error){
console.error(error)
return
}

listings = data
renderFilters()
renderListings()

}

function renderFilters(){

const filterBox = document.getElementById("filters")

const allTypes = new Set()

listings.forEach(l => {
if(l.types){
l.types.forEach(t => allTypes.add(t))
}
})

filterBox.innerHTML = ""

const allButton = document.createElement("div")
allButton.className = "filter active"
allButton.innerText = "All"
allButton.onclick = () => {
activeFilter = null
renderListings()
updateActive(allButton)
}

filterBox.appendChild(allButton)

allTypes.forEach(type => {

const btn = document.createElement("div")
btn.className = "filter"
btn.innerText = type

btn.onclick = () => {
activeFilter = type
renderListings()
updateActive(btn)
}

filterBox.appendChild(btn)

})

}

function updateActive(btn){

document.querySelectorAll(".filter").forEach(f=>{
f.classList.remove("active")
})

btn.classList.add("active")

}

function renderListings(){

const container = document.getElementById("listings")

container.innerHTML = ""

let filtered = listings

if(activeFilter){
filtered = listings.filter(l => l.types && l.types.includes(activeFilter))
}

filtered.forEach(l => {

const card = document.createElement("div")
card.className = "card"

card.innerHTML = `
<div class="name">${l.name}</div>
<div class="types">${(l.types || []).join(", ")}</div>
<div class="notes">${l.notes || ""}</div>

<div class="buttons">
<button class="call" onclick="window.location.href='tel:${l.contact}'">Call</button>
<button class="directions" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(l.location)}')">Directions</button>
</div>
`

container.appendChild(card)

})

}

loadListings()

</script>

</body>
</html>
