<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustOffI80 – DuBois Exit Guide</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4;}
header{background:#2b5cff;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
.container{max-width:900px;margin:auto;padding:16px;}
.search input{width:100%;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ccc;margin-bottom:12px;}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.filter{background:white;border:1px solid #ddd;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:14px;text-transform:capitalize;}
.filter.active{background:#2b5cff;color:white;}
.locate-btn,.submit-btn{background:#2b5cff;color:white;border:none;padding:10px 14px;border-radius:6px;cursor:pointer;margin-bottom:10px;margin-right:6px;}
#map{height:320px;border-radius:10px;margin-bottom:20px;}
.card{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.name{font-size:18px;font-weight:bold;}
.address{color:#555;margin-bottom:8px;}
.form-box{background:white;padding:16px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 6px rgba(0,0,0,0.08);display:none;}
.form-box input,.form-box textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc;}
.success{color:green;font-weight:bold;margin-top:8px;}
</style>
</head>

<body>

<header>Just Off i80 – DuBois Resource Directory</header>

<div class="container">

<button class="submit-btn" onclick="toggleForm()">+ Submit Listing</button>
<button id="locateBtn" class="locate-btn">📍 Locate Me</button>

<div id="submissionForm" class="form-box">

<h3>Submit Listing</h3>

<input id="s_name" placeholder="Organization Name">
<input id="s_types" placeholder="Categories (comma separated)">
<input id="s_location" placeholder="Full Address">
<input id="s_contact" placeholder="Phone or Email">
<input id="s_website" placeholder="Website">
<textarea id="s_notes" placeholder="Description"></textarea>

<button onclick="submitListing()">Send</button>

<div id="formSuccess" class="success"></div>

</div>

<div class="search">
<input id="searchBox" placeholder="Search listings">
</div>

<div id="filters" class="filters"></div>
<div id="map"></div>
<div id="listings"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase=createClient(
"https://jvnmqvdgnywtgjcyagiu.supabase.co",
"sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm"
)

let listings=[]
let activeFilter=null
let searchTerm=""

const map=L.map('map').setView([41.12,-78.76],12)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
let markerGroup=L.featureGroup().addTo(map)

window.toggleForm=function(){
const f=document.getElementById("submissionForm")
f.style.display=f.style.display==="none"?"block":"none"
}

window.submitListing=function(){

const name=document.getElementById("s_name").value.trim()
const types=document.getElementById("s_types").value.trim()
const location=document.getElementById("s_location").value.trim()
const contact=document.getElementById("s_contact").value.trim()
const website=document.getElementById("s_website").value.trim()
const notes=document.getElementById("s_notes").value.trim()

if(!name || !location){
alert("Name and Address required")
return
}

const body =
"Organization Name: "+name+"%0D%0A"+
"Categories: "+types+"%0D%0A"+
"Address: "+location+"%0D%0A"+
"Contact: "+contact+"%0D%0A"+
"Website: "+website+"%0D%0A"+
"Description: "+notes

const mailURL =
"mailto:i80app@gmail.com?subject=New Listing Submission&body="+body

window.open(mailURL,"_blank")

document.getElementById("formSuccess").innerText=
"Email window opened. Press SEND."

}

async function loadListings(){
const {data}=await supabase.from("listings_core").select("*").eq("approved",true)
listings=data||[]
renderFilters()
renderListings()
}

function normalizeTypes(types){
if(!types)return[]
if(typeof types==="string"){
try{return JSON.parse(types)}catch{return[]}
}
return types
}

function extractCoords(link){
if(!link)return null
let m=link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/)
if(m)return{lat:parseFloat(m[1]),lng:parseFloat(m[2])}
return null
}

function renderFilters(){
const box=document.getElementById("filters")
box.innerHTML=""
const set=new Set()

listings.forEach(l=>{
normalizeTypes(l.types).forEach(t=>set.add(t))
})

const all=document.createElement("div")
all.className="filter active"
all.innerText="All"
all.onclick=()=>{activeFilter=null;renderListings();updateActive(all)}
box.appendChild(all)

set.forEach(t=>{
const btn=document.createElement("div")
btn.className="filter"
btn.innerText=t
btn.onclick=()=>{activeFilter=t;renderListings();updateActive(btn)}
box.appendChild(btn)
})
}

function updateActive(btn){
document.querySelectorAll(".filter").forEach(f=>f.classList.remove("active"))
btn.classList.add("active")
}

function renderListings(){
const container=document.getElementById("listings")
container.innerHTML=""
markerGroup.clearLayers()

let filtered=listings

if(activeFilter){
filtered=filtered.filter(l=>normalizeTypes(l.types).includes(activeFilter))
}

if(searchTerm){
filtered=filtered.filter(l=>(l.name+l.location+l.notes).toLowerCase().includes(searchTerm))
}

filtered.forEach(l=>{
const c=extractCoords(l.map_link)
if(c)L.marker([c.lat,c.lng]).addTo(markerGroup)

const card=document.createElement("div")
card.className="card"
card.innerHTML=`<div class="name">${l.name}</div><div class="address">${l.location}</div><div>${l.notes}</div>`
container.appendChild(card)
})

if(markerGroup.getLayers().length>0){
map.fitBounds(markerGroup.getBounds(),{padding:[40,40]})
}
}

document.getElementById("searchBox").addEventListener("input",e=>{
searchTerm=e.target.value.toLowerCase()
renderListings()
})

document.getElementById("locateBtn").addEventListener("click",()=>{
navigator.geolocation.getCurrentPosition(pos=>{
map.setView([pos.coords.latitude,pos.coords.longitude],14)
L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map)
})
})

loadListings()

</script>

</body>
</html>
