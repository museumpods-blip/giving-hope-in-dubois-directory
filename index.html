<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JustOffI80 – DuBois Exit Guide</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b5cff">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{font-family:Arial,sans-serif;margin:0;background:#f4f4f4;}
header{background:#2b5cff;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
.container{max-width:900px;margin:auto;padding:16px;}

.search input{width:100%;padding:12px;font-size:16px;border-radius:8px;border:1px solid #ccc;margin-bottom:12px;}

.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.filter{background:white;border:1px solid #ddd;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:14px;text-transform:capitalize;}
.filter.active{background:#2b5cff;color:white;}

.locate-btn,.submit-btn,.install-btn{
background:#2b5cff;color:white;border:none;padding:10px 14px;
border-radius:6px;cursor:pointer;margin-bottom:10px;margin-right:6px;
}

.install-btn{background:#28a745;}

.ios-banner{
display:none;
background:#fff3cd;
border:1px solid #ffeeba;
padding:10px;
border-radius:6px;
margin-bottom:12px;
font-size:14px;
}

#map{height:320px;border-radius:10px;margin-bottom:20px;}

.card{background:white;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.name{font-size:18px;font-weight:bold;}
.address{color:#555;margin-bottom:8px;}

.buttons{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.btn{flex:1;padding:10px;border-radius:6px;text-align:center;text-decoration:none;color:white;font-size:14px;}
.call{background:#28a745;}
.directions{background:#444;}
.remove{background:#c82333;}

.form-box{
background:white;padding:16px;border-radius:10px;margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);display:none;
}

.form-box input,.form-box textarea{
width:100%;padding:10px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc;
}

.success{color:green;font-weight:bold;margin-top:10px;}
</style>
</head>

<body>

<header>JustOffI80 – DuBois Exit Guide</header>

<div class="container">

<div id="iosBanner" class="ios-banner">
📲 On iPhone: Tap <strong>Share</strong> → <strong>Add to Home Screen</strong> to install this app.
</div>

<button class="submit-btn" onclick="toggleForm()">+ Submit Listing</button>
<button id="locateBtn" class="locate-btn">📍 Locate Me</button>
<button id="installBtn" class="install-btn" style="display:none;">⬇ Add to Home Screen</button>

<div id="submissionForm" class="form-box">
<h3>Submit a Listing</h3>
<input id="s_name" placeholder="Organization Name" required>
<input id="s_types" placeholder="Categories (comma separated, lowercase)" required>
<input id="s_location" placeholder="Full Address (required)" required>
<input id="s_contact" placeholder="Phone">
<textarea id="s_notes" placeholder="Description"></textarea>
<button onclick="submitListing()">Submit</button>
<div id="formSuccess" class="success"></div>
</div>

<div class="search">
<input id="searchBox" type="text" placeholder="Search...">
</div>

<div id="filters" class="filters"></div>
<div id="map"></div>
<div id="listings"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script type="module">

import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabaseUrl="https://jvnmqvdgnywtgjcyagiu.supabase.co"
const supabaseKey="sb_publishable_EC399fKXbwpp4pnZfxocLA__yRyugBm"
const supabase=createClient(supabaseUrl,supabaseKey)

let listings=[]
let activeFilter=null
let searchTerm=""
let userMarker=null

const map=L.map('map').setView([41.12,-78.76],12)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map)
let markerGroup=L.featureGroup().addTo(map)

const redIcon = new L.Icon({
iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
iconSize:[25,41],
iconAnchor:[12,41],
popupAnchor:[1,-34],
shadowSize:[41,41]
})

window.toggleForm=function(){
const form=document.getElementById("submissionForm")
form.style.display=form.style.display==="none"?"block":"none"
}

window.submitListing=async function(){
const name=document.getElementById("s_name").value.trim()
const types=document.getElementById("s_types").value.split(",").map(t=>t.trim().toLowerCase())
const location=document.getElementById("s_location").value.trim()
const contact=document.getElementById("s_contact").value.trim()
const notes=document.getElementById("s_notes").value.trim()
if(!name||!location){alert("Name and Address required.");return}
await supabase.from("listings_core").insert([{name,types,location,contact,notes,approved:false}])
document.getElementById("formSuccess").innerText="Submitted for approval."
}

async function loadListings(){
const {data}=await supabase.from("listings_core").select("*").eq("approved",true)
listings=data||[]
renderFilters()
renderListings()
}

function extractCoords(link){
if(!link)return null
let match=link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/)
if(match)return{lat:parseFloat(match[1]),lng:parseFloat(match[2])}
return null
}

function cleanPhone(phone){return(phone||"").replace(/[^0-9]/g,'')}

function renderFilters(){
const filterBox=document.getElementById("filters")
filterBox.innerHTML=""
const allTypes=new Set()
listings.forEach(l=>{if(l.types){l.types.forEach(t=>allTypes.add(t.toLowerCase()))}})
const allButton=document.createElement("div")
allButton.className="filter active"
allButton.innerText="All"
allButton.onclick=()=>{activeFilter=null;renderListings();updateActive(allButton)}
filterBox.appendChild(allButton)
allTypes.forEach(type=>{
const btn=document.createElement("div")
btn.className="filter"
btn.innerText=type
btn.onclick=()=>{activeFilter=type;renderListings();updateActive(btn)}
filterBox.appendChild(btn)
})
}

function updateActive(btn){
document.querySelectorAll(".filter").forEach(f=>f.classList.remove("active"))
btn.classList.add("active")
}

function renderListings(){
const container=document.getElementById("listings")
container.innerHTML=""
markerGroup.clearLayers()

let filtered=listings
if(activeFilter)filtered=filtered.filter(l=>l.types&&l.types.includes(activeFilter))
if(searchTerm)filtered=filtered.filter(l=>{
const text=(l.name||"")+(l.location||"")+(l.notes||"")
return text.toLowerCase().includes(searchTerm.toLowerCase())
})

filtered.forEach(l=>{
const coords=extractCoords(l.map_link)
if(coords){
const phoneClean=cleanPhone(l.contact)
const popupContent=`<b>${l.name||""}</b><br>${l.location||""}`
L.marker([coords.lat,coords.lng]).addTo(markerGroup).bindPopup(popupContent)
}
const phoneClean=cleanPhone(l.contact)
const subject=encodeURIComponent("Removal Request – "+l.name)
const card=document.createElement("div")
card.className="card"
card.innerHTML=`
<div class="name">${l.name||""}</div>
<div class="address">${l.location||""}</div>
<div>${l.notes||""}</div>
<div>Phone: ${l.contact||""}</div>
<div class="buttons">
<a class="btn call" href="tel:${phoneClean}">Call</a>
<a class="btn directions" target="_blank"
href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(l.location)}">
Directions</a>
<a class="btn remove" href="mailto:givinghopedubois@gmail.com?subject=${subject}">
Request Removal</a>
</div>`
container.appendChild(card)
})
}

document.getElementById("searchBox").addEventListener("input",e=>{
searchTerm=e.target.value
renderListings()
})

document.getElementById("locateBtn").addEventListener("click",()=>{
if(!navigator.geolocation)return
navigator.geolocation.getCurrentPosition(position=>{
const lat=position.coords.latitude
const lng=position.coords.longitude
map.setView([lat,lng],14)
if(userMarker)map.removeLayer(userMarker)
userMarker=L.marker([lat,lng],{icon:redIcon}).addTo(map).bindPopup("<b>You Are Here</b>").openPopup()
})
})

loadListings()

/* INSTALL LOGIC */
let deferredPrompt;
const installBtn=document.getElementById("installBtn");
const iosBanner=document.getElementById("iosBanner");

function isIOS(){
return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function isInStandaloneMode(){
return window.matchMedia('(display-mode: standalone)').matches;
}

if(isIOS()&&!isInStandaloneMode()){
iosBanner.style.display="block";
}

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="inline-block";
});

installBtn.addEventListener("click",async()=>{
if(!deferredPrompt)return;
deferredPrompt.prompt();
const{outcome}=await deferredPrompt.userChoice;
if(outcome==="accepted")installBtn.style.display="none";
deferredPrompt=null;
});

if("serviceWorker"in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
